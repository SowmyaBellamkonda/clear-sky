services:
  # 1. ClearSky ML Service (Python + FastAPI)
  - type: web
    name: clearsky-ml-service
    env: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OWM_API_KEY
        sync: false

  # 2. ClearSky Backend Service (Node.js + Express)
  - type: web
    name: clearsky-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
